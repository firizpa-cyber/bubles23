<div [class]="'relative w-[532px] h-[600px] mx-auto transition-colors duration-1000 ' + (theme === 'black' ? 'bg-[#050505]' : 'bg-white') + ' shadow-2xl overflow-hidden rounded-[40px]'">
  <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
    <div class="w-[362px] h-[454px] relative">
      <div class="absolute inset-0 border border-dashed border-[#8A38F5] rounded-[5px] opacity-20"></div>
      
      <div class="absolute -top-8 left-0 text-[10px] font-mono text-[#8A38F5] uppercase tracking-widest opacity-60">
        {{ currentVariant.title }}
      </div>

      <!-- Background Circles -->
      <ng-container *ngFor="let circle of currentVariant.bg; let i = index">
        <div
          class="absolute rounded-full overflow-hidden flex items-center justify-center transition-all duration-700 ease-[cubic-bezier(0.34,1.56,0.64,1)]"
          [style.width.px]="circle.size"
          [style.height.px]="circle.size"
          [style.left]="getLeft(circle.left)"
          [style.top]="getTop(circle.top)"
          [style.backgroundColor]="circle.color || 'transparent'"
          [style.opacity]="circle.opacity"
          [style.filter]="circle.blur ? 'blur(' + circle.blur + 'px)' : 'none'"
          [style.boxShadow]="circle.glow ? '0 0 40px rgba(255, 105, 180, 0.8), 0 0 20px rgba(138, 56, 245, 0.4), 0 0 10px rgba(255, 215, 0, 0.3)' : 'none'"
        >
          <div class="w-full h-full" 
               [class.animate-pulse]="circle.pulse" 
               [class.animate-twinkle]="circle.twinkle"
               [style.animationDelay]="i * 0.1 + 's'">
          </div>
        </div>
      </ng-container>

      <!-- Image Circles -->
      <ng-container *ngFor="let circle of currentVariant.images; let i = index">
        <div
          class="absolute rounded-full overflow-hidden flex items-center justify-center group transition-all duration-700 ease-[cubic-bezier(0.34,1.56,0.64,1)]"
          [style.width.px]="circle.size"
          [style.height.px]="circle.size"
          [style.left]="getLeft(circle.left)"
          [style.top]="getTop(circle.top)"
          [style.boxShadow]="'0 8px 25px rgba(160, 73, 212, 0.12)'"
          [style.border]="'2px solid rgba(255,255,255,0.5)'"
          [style.cursor]="'pointer'"
        >
          <div class="w-full h-full flex items-center justify-center animate-float" 
               [class.animate-pulse]="circle.pulse"
               [style.animationDelay]="i * 0.2 + 's'">
            <img
              [src]="circle.image"
              alt="User"
              class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110"
              referrerPolicy="no-referrer"
            />
          </div>
        </div>
      </ng-container>
    </div>
  </div>

  <!-- Progress Indicators -->
  <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2">
    <div
      *ngFor="let v of variants; let i = index"
      class="h-1 rounded-full transition-all duration-500"
      [class.w-8]="i === currentIndex"
      [class.bg-[#8A38F5]]="i === currentIndex"
      [class.w-2]="i !== currentIndex"
      [class.bg-[#8A38F5]/20]="i !== currentIndex"
    ></div>
  </div>
</div>
